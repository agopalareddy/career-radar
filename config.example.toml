# Copy to config.toml and edit. config.toml is gitignored — safe to personalize.

# OpenRouter model for synthesis. deepseek-v4-flash is the budget pick
# ($0.09/$0.18 per million tokens; a daily run costs a fraction of a cent).
# Any OpenRouter model id works, e.g. "deepseek/deepseek-v4-pro" or
# "anthropic/claude-haiku-4.5" for deeper analysis.
model = "deepseek/deepseek-v4-flash"
max_output_tokens = 8192

# Where the living insights document is written (gitignored by default).
insights_path = "data/INSIGHTS.md"

# ── Reddit RSS (posts only via public RSS feeds, no auth) ──
# Reddit rate-limits RSS to ~1 req/60s. 10s delay between calls.
# No comments available via RSS — comments come from HN + Dev.to.
reddit_subreddits = [
  "jobsearch",
  "gradadmissions",
  "jobsearchhacks",
  "GetEmployed",
]
reddit_posts_per_sub = 10
reddit_rss_delay = 10 # seconds between subreddit calls

# ── Hacker News (HN Algolia, no auth) ──
hn_queries = [
  "resume OR CV OR cover letter OR career advice",
  "job search OR interview OR hiring OR layoffs",
  "salary negotiation OR compensation OR raise OR offer",
]
hn_hits_per_query = 10
hn_top_for_comments = 3 # fetch comments for top N hits per query
hn_comments_per_post = 3

# ── Dev.to (Forem API v0, no auth) ──
devto_tags = ["career", "webdev", "beginners", "productivity", "interview"]
devto_articles_per_tag = 5
devto_top_for_comments = 2
devto_comments_per_post = 3
