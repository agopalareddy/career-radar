# Copy to config.toml and edit. config.toml is gitignored — safe to personalize.

# OpenRouter model for synthesis. deepseek-v4-flash is the budget pick
# ($0.09/$0.18 per million tokens; a daily run costs a fraction of a cent).
# Any OpenRouter model id works, e.g. "deepseek/deepseek-v4-pro" or
# "anthropic/claude-haiku-4.5" for deeper analysis.
model = "deepseek/deepseek-v4-flash"
max_output_tokens = 8192

# Where the living insights document is written (gitignored by default).
insights_path = "data/INSIGHTS.md"

# Subreddits to scan. Tailor to your field — e.g. add r/datascience,
# r/ExperiencedDevs, r/UXDesign, ...
subreddits = [
  "jobs",
  "careerguidance",
  "resumes",
  "EngineeringResumes",
  "cscareerquestions",
  "interviews",
  "negotiation",
  "GetEmployed",
]

# "day" for a daily run; "week" if you schedule weekly.
timeframe = "day"

# Request budget: 1 token request + 1 listing per subreddit
# + top_posts_with_comments comment fetches per subreddit.
# Defaults: 1 + 8 + 24 = 33 requests/run — far below Reddit's
# free-tier limit of 100 requests/minute (10k/day guideline).
posts_per_subreddit = 10
top_posts_with_comments = 3
comments_per_post = 2
request_delay_seconds = 1.0
